<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Chat WebRTC</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
      margin-bottom: 10px;
    }

    button:hover {
      background: #764ba2;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #status {
      text-align: center;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
      color: #333;
      font-weight: bold;
      margin-top: 20px;
      min-height: 30px;
    }

    .users-list {
      margin-top: 30px;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 8px;
    }

    .users-list h3 {
      color: #333;
      margin-bottom: 15px;
    }

    .user-item {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #667eea;
    }

    .user-name {
      font-weight: bold;
      color: #333;
    }

    .call-btn {
      background: #28a745;
      padding: 8px 16px;
      font-size: 14px;
      width: auto;
      margin: 0;
    }

    .call-btn:hover {
      background: #218838;
    }

    .call-btn.active {
      background: #dc3545;
    }

    .call-btn.active:hover {
      background: #c82333;
    }

    .stats {
      margin-top: 20px;
      padding: 15px;
      background: #e3f2fd;
      border-radius: 8px;
      font-size: 14px;
      color: #1976d2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎤 Voice Chat WebRTC</h1>

    <div class="form-group">
      <label for="username">Ton Pseudonyme :</label>
      <input type="text" id="username" placeholder="Ex: Alice" value="">
    </div>

    <button onclick="connectToServer()">Se Connecter</button>
    <button onclick="startVoiceChat()" id="startBtn" disabled>Activer Micro</button>
    <button onclick="stopVoiceChat()" id="stopBtn" disabled>Désactiver Micro</button>

    <div id="status">En attente...</div>

    <div class="users-list" id="usersContainer" style="display: none;">
      <h3>👥 Utilisateurs en ligne :</h3>
      <div id="usersList"></div>
    </div>

    <div class="stats" id="stats" style="display: none;">
      <div>🎤 Micro : <span id="micStatus">Inactif</span></div>
      <div>📱 Appels actifs : <span id="callCount">0</span></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script>
    // ========== CONFIG ==========
    const rtcConfig = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        {
          urls: "turn:openrelay.metered.ca:80",
          username: "openrelayproject",
          credential: "openrelayproject"
        },
        {
          urls: "turn:openrelay.metered.ca:443",
          username: "openrelayproject",
          credential: "openrelayproject"
        }
      ]
    };

    // ========== VARIABLES GLOBALES ==========
    let socket;
    let myId;
    let myUsername;
    let localStream;
    let peers = {}; // { userId: RTCPeerConnection }
    let remoteAudios = {}; // { userId: HTMLAudioElement }
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    // ========== CONNEXION SERVEUR ==========
    function connectToServer() {
      myUsername = document.getElementById("username").value.trim();

      if (!myUsername) {
        statusEl.innerText = "❌ Entre un pseudonyme !";
        return;
      }

      statusEl.innerText = "⏳ Connexion au serveur...";

      socket = io();

      socket.on("connect", () => {
        console.log("✅ Connecté au serveur !");
        statusEl.innerText = "✅ Connecté !";
        startBtn.disabled = false;
        socket.emit("register", { username: myUsername });
      });

      socket.on("registered", ({ userId }) => {
        myId = userId;
        console.log("📝 Enregistré avec l'ID :", myId);
        statusEl.innerText = "✅ Enregistré - Active ton micro !";
      });

      socket.on("usersList", ({ users }) => {
        console.log("👥 Liste des users :", users);
        updateUsersList(users);
      });

      socket.on("userJoined", ({ userId, username }) => {
        console.log(`🟢 ${username} a rejoint !`);
        statusEl.innerText = `🟢 ${username} a rejoint !`;
        socket.emit("getUsersList");
      });

      socket.on("userLeft", ({ userId, username }) => {
        console.log(`🔴 ${username} s'est déconnecté`);
        statusEl.innerText = `🔴 ${username} s'est déconnecté`;
        
        if (peers[userId]) {
          peers[userId].close();
          delete peers[userId];
        }
        if (remoteAudios[userId]) {
          remoteAudios[userId].pause();
          remoteAudios[userId].srcObject = null;
          document.body.removeChild(remoteAudios[userId]);
          delete remoteAudios[userId];
        }
        
        socket.emit("getUsersList");
      });

      socket.on("signal", async ({ from, data }) => {
        console.log("📡 Signal reçu de", from, "type:", data.type);
        
        let pc = peers[from];
        
        if (!pc) {
          console.log("📞 Pas de peer pour", from, "en création...");
          pc = createPeerConnection(from);
        }

        try {
          if (data.type === "offer") {
            console.log("📥 OFFER - setRemoteDescription...");
            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            console.log("📢 Answer créée");
            await pc.setLocalDescription(answer);
            console.log("📤 Envoi answer...");
            socket.emit("signal", { to: from, data: { type: "answer", answer } });
          } else if (data.type === "answer") {
            console.log("📥 ANSWER - setRemoteDescription...");
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            console.log("✅ Connection établie avec", from);
          } else if (data.type === "candidate") {
            console.log("❄️ ICE candidate de", from);
            if (pc.remoteDescription) {
              await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            } else {
              console.warn("⚠️ RemoteDescription pas encore prêt");
            }
          }
        } catch (err) {
          console.error("❌ Erreur signal :", err);
        }
      });

      socket.on("disconnect", () => {
        console.log("❌ Déconnecté du serveur");
        statusEl.innerText = "❌ Déconnecté du serveur";
        startBtn.disabled = true;
        stopBtn.disabled = true;
      });
    }

    // ========== MICRO ==========
    async function startVoiceChat() {
      const statusEl = document.getElementById("status");
      try {
        console.log("🎤 Demande d'accès au micro...");
        localStream = await navigator.mediaDevices.getUserMedia({ 
          audio: { 
            echoCancellation: true, 
            noiseSuppression: true,
            autoGainControl: true
          },
          video: false 
        });
        console.log("✅ Micro activé ! Tracks :", localStream.getAudioTracks().length);
        statusEl.innerText = "✅ Micro activé";
        document.getElementById("micStatus").innerText = "Actif 🎤";
        startBtn.disabled = true;
        stopBtn.disabled = false;
      } catch (err) {
        statusEl.innerText = "❌ Erreur micro : " + err.message;
        console.error("❌ Erreur micro :", err);
        throw err;
      }
    }

    function stopVoiceChat() {
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
        console.log("⏹️ Micro arrêté");
        statusEl.innerText = "⏹️ Micro arrêté";
        document.getElementById("micStatus").innerText = "Inactif";
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    }

    // ========== WEBRTC ==========
    function createPeerConnection(remoteId) {
      console.log("🔧 Création PeerConnection pour", remoteId);
      const pc = new RTCPeerConnection(rtcConfig);

      if (localStream) {
        console.log("✅ localStream existe, tracks :", localStream.getAudioTracks().length);
        localStream.getAudioTracks().forEach((track, i) => {
          console.log("➕ Ajout track audio #" + i + " pour", remoteId);
          pc.addTrack(track, localStream);
        });
      } else {
        console.error("❌ localStream n'existe pas !");
      }

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          console.log("❄️ ICE candidate pour", remoteId);
          socket.emit("signal", { to: remoteId, data: { type: "candidate", candidate: event.candidate } });
        }
      };

      pc.ontrack = (event) => {
        console.log("🔊 ONTRACK - Audio reçu de", remoteId);
        if (!remoteAudios[remoteId]) {
          const audio = new Audio();
          audio.srcObject = event.streams[0];
          audio.play().catch(err => console.warn("Erreur play :", err));
          document.body.appendChild(audio);
          remoteAudios[remoteId] = audio;
          console.log("🔊 Lecteur audio créé pour", remoteId);
        }
      };

      pc.onconnectionstatechange = () => {
        console.log("🔌 Connection state :", pc.connectionState);
      };

      peers[remoteId] = pc;
      return pc;
    }

    async function callUser(userId) {
      console.log("📞 Appel à", userId);
      
      if (!localStream) {
        statusEl.innerText = "❌ Active ton micro d'abord !";
        return;
      }

      let pc = peers[userId];
      if (!pc) {
        pc = createPeerConnection(userId);
      }

      try {
        console.log("📞 Création OFFER pour", userId);
        const offer = await pc.createOffer({
          offerToReceiveAudio: true
        });
        console.log("📢 Offer créée pour", userId);
        await pc.setLocalDescription(offer);
        console.log("📤 Sending offer...");
        socket.emit("signal", { to: userId, data: { type: "offer", offer } });
      } catch (err) {
        console.error("❌ Erreur création offer :", err);
      }
    }

    // ========== UI ==========
    function updateUsersList(users) {
      const container = document.getElementById("usersContainer");
      const list = document.getElementById("usersList");
      list.innerHTML = "";

      const otherUsers = users.filter(u => u.id !== myId);

      if (otherUsers.length === 0) {
        list.innerHTML = "<p style='color: #999;'>Aucun autre utilisateur en ligne</p>";
        container.style.display = "none";
        return;
      }

      container.style.display = "block";
      otherUsers.forEach(user => {
        const div = document.createElement("div");
        div.className = "user-item";
        div.innerHTML = `
          <span class="user-name">${user.username}</span>
          <button class="call-btn" onclick="callUser('${user.id}')">Appeler</button>
        `;
        list.appendChild(div);
      });

      document.getElementById("callCount").innerText = Object.keys(peers).length;
    }
  </script>
</body>
</html>
