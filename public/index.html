<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat Vocal</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1e1e2f;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  #joinScreen input {
    padding: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    margin-bottom: 10px;
  }
  #joinScreen button, #chatScreen button {
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    background: #4CAF50;
    color: white;
    cursor: pointer;
    margin-top: 10px;
  }
  #joinScreen button:hover, #chatScreen button:hover {
    background: #45a049;
  }
  #muteBtn.muted {
    background: #e74c3c;
  }
  #muteBtn.muted:hover {
    background: #c0392b;
  }
  #chatScreen {
    display: none;
    text-align: center;
  }
  #playersList {
    margin-top: 20px;
    list-style: none;
    padding: 0;
    min-width: 250px;
  }
  #playersList li {
    background: #2c2c3e;
    margin: 5px 0;
    padding: 8px 15px;
    border-radius: 5px;
  }
  #status {
    margin-top: 10px;
    font-size: 14px;
    color: #aaa;
  }
</style>
</head>
<body>

<div id="joinScreen">
  <h1>🎤 Chat Vocal</h1>
  <input type="text" id="nameInput" placeholder="Entre ton nom" maxlength="20"><br>
  <button id="joinBtn">Rejoindre</button>
</div>

<div id="chatScreen">
  <h1>✅ Connecté au chat vocal</h1>
  <p id="myName"></p>
  <button id="muteBtn">🔊 Micro actif (clique pour couper)</button>
  <p id="status">Micro en attente...</p>
  <h3>Joueurs connectés :</h3>
  <ul id="playersList"></ul>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = "";
  let localStream = null;
  let isMuted = false;
  const peers = {};

  const rtcConfig = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  };

  function joinChat() {
    const input = document.getElementById("nameInput");
    const name = input.value.trim();

    if (name === "") {
      alert("Merci d'entrer un nom !");
      return;
    }

    myName = name;
    socket.emit("join", { name: name });

    document.getElementById("joinScreen").style.display = "none";
    document.getElementById("chatScreen").style.display = "block";
    document.getElementById("myName").innerText = "Tu es connecté en tant que : " + name;

    startVoiceChat();
  }

  document.getElementById("joinBtn").addEventListener("click", joinChat);
  document.getElementById("nameInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") joinChat();
  });

  document.getElementById("muteBtn").addEventListener("click", function() {
    isMuted = !isMuted;
    if (localStream) {
      localStream.getAudioTracks().forEach(track => {
        track.enabled = !isMuted;
      });
    }
    const btn = document.getElementById("muteBtn");
    if (isMuted) {
      btn.innerText = "🔇 Micro coupé (clique pour activer)";
      btn.classList.add("muted");
    } else {
      btn.innerText = "🔊 Micro actif (clique pour couper)";
      btn.classList.remove("muted");
    }
  });

  socket.on("playersUpdate", (players) => {
    const list = document.getElementById("playersList");
    list.innerHTML = "";
    players.forEach((p) => {
      const li = document.createElement("li");
      li.innerText = "🎮 " + p.name + (p.id === socket.id ? " (toi)" : "");
      list.appendChild(li);
    });
  });

  // === MICRO ===
  async function startVoiceChat() {
    const statusEl = document.getElementById("status");
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      statusEl.innerText = "Micro activé ✅";
    } catch (err) {
      statusEl.innerText = "Erreur d'accès au micro ❌ : " + err.message;
      console.error(err);
      return;
    }
  }

  // === WEBRTC : gestion des connexions entre joueurs ===

  function createPeerConnection(remoteId) {
    const pc = new RTCPeerConnection(rtcConfig);

    if (localStream) {
      localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
      });
    }

    pc.onicecandidate = (event) => {
      if (event.candidate) {
        socket.emit("signal", {
          to: remoteId,
          data: { type: "candidate", candidate: event.candidate }
        });
      }
    };

    pc.ontrack = (event) => {
      let audioEl = document.getElementById("audio-" + remoteId);
      if (!audioEl) {
        audioEl = document.createElement("audio");
        audioEl.id = "audio-" + remoteId;
        audioEl.autoplay = true;
        document.body.appendChild(audioEl);
      }
      audioEl.srcObject = event.streams[0];
    };

    peers[remoteId] = pc;
    return pc;
  }

  socket.on("newPlayer", async ({ id }) => {
    if (id === socket.id) return;
    const pc = createPeerConnection(id);
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("signal", { to: id, data: { type: "offer", offer } });
  });

  socket.on("signal", async ({ from, data }) => {
    let pc = peers[from];
    if (!pc) {
      pc = createPeerConnection(from);
    }

    if (data.type === "offer") {
      await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit("signal", { to: from, data: { type: "answer", answer } });
    } else if (data.type === "answer") {
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
    } else if (data.type === "candidate") {
      try {
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
      } catch (e) {
        console.error("Erreur ICE candidate:", e);
      }
    }
  });

  socket.on("playerLeft", ({ id }) => {
    if (peers[id]) {
      peers[id].close();
      delete peers[id];
    }
    const audioEl = document.getElementById("audio-" + id);
    if (audioEl) audioEl.remove();
  });
</script>
</body>
</html>
