<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Vocal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .content {
      padding: 30px 20px;
    }

    #joinScreen {
      display: block;
    }

    #chatScreen {
      display: none;
    }

    .input-group {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button.muted {
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
    }

    #playersList {
      list-style: none;
      margin-top: 20px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
    }

    #playersList li {
      padding: 10px;
      margin: 5px 0;
      background: white;
      border-left: 4px solid #667eea;
      border-radius: 4px;
      font-size: 14px;
    }

    #myName {
      color: #667eea;
      font-size: 14px;
      margin-bottom: 15px;
      text-align: center;
    }

    #status {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 10px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .button-group button {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎤 Chat Vocal</h1>
      <p id="status">En attente...</p>
    </div>

    <div class="content">
      <!-- ÉCRAN DE CONNEXION -->
      <div id="joinScreen">
        <h2 style="margin-bottom: 20px; color: #333;">Rejoins le chat</h2>
        <div class="input-group">
          <input 
            type="text" 
            id="nameInput" 
            placeholder="Ton pseudo..." 
            autocomplete="off"
          >
        </div>
        <button id="joinBtn">Rejoindre 🚀</button>
      </div>

      <!-- ÉCRAN DU CHAT -->
      <div id="chatScreen">
        <div id="myName"></div>
        
        <div class="button-group">
          <button id="muteBtn">🔊 Micro actif</button>
        </div>

        <h3 style="margin-bottom: 10px; color: #333;">Joueurs connectés :</h3>
        <ul id="playersList"></ul>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myName = "";
    let localStream = null;
    let isMuted = false;
    const peers = {};

    const rtcConfig = {
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    };

    function joinChat() {
      const input = document.getElementById("nameInput");
      const name = input.value.trim();

      if (name === "") {
        alert("Merci d'entrer un nom !");
        return;
      }

      myName = name;

      document.getElementById("joinScreen").style.display = "none";
      document.getElementById("chatScreen").style.display = "block";
      document.getElementById("myName").innerText = "Tu es connecté en tant que : " + name;

      // D'ABORD démarrer le micro, PUIS rejoindre
      startVoiceChat().then(() => {
        socket.emit("join", { name: name });
      });
    }

    document.getElementById("joinBtn").addEventListener("click", joinChat);
    document.getElementById("nameInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") joinChat();
    });

    document.getElementById("muteBtn").addEventListener("click", function() {
      isMuted = !isMuted;
      if (localStream) {
        localStream.getAudioTracks().forEach(track => {
          track.enabled = !isMuted;
        });
      }
      const btn = document.getElementById("muteBtn");
      if (isMuted) {
        btn.innerText = "🔇 Micro coupé";
        btn.classList.add("muted");
      } else {
        btn.innerText = "🔊 Micro actif";
        btn.classList.remove("muted");
      }
    });

    socket.on("playersUpdate", (players) => {
      const list = document.getElementById("playersList");
      list.innerHTML = "";
      players.forEach((p) => {
        const li = document.createElement("li");
        li.innerText = "🎮 " + p.name + (p.id === socket.id ? " (toi)" : "");
        list.appendChild(li);
      });
    });
