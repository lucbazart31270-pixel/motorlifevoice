<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat Vocal</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1e1e2f;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  #joinScreen input {
    padding: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    margin-bottom: 10px;
  }
  #joinScreen button {
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    background: #4CAF50;
    color: white;
    cursor: pointer;
  }
  #joinScreen button:hover {
    background: #45a049;
  }
  #chatScreen {
    display: none;
    text-align: center;
  }
  #playersList {
    margin-top: 20px;
    list-style: none;
    padding: 0;
  }
  #playersList li {
    background: #2c2c3e;
    margin: 5px 0;
    padding: 8px 15px;
    border-radius: 5px;
  }
</style>
</head>
<body>

<div id="joinScreen">
  <h1>🎤 Chat Vocal</h1>
  <input type="text" id="nameInput" placeholder="Entre ton nom" maxlength="20"><br>
  <button onclick="joinChat()">Rejoindre</button>
</div>

<div id="chatScreen">
  <h1>✅ Connecté au chat vocal</h1>
  <p id="myName"></p>
  <h3>Joueurs connectés :</h3>
  <ul id="playersList"></ul>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = "";

  function joinChat() {
    const input = document.getElementById("nameInput");
    const name = input.value.trim();

    if (name === "") {
      alert("Merci d'entrer un nom !");
      return;
    }

    myName = name;

    // Envoie le nom au serveur
    socket.emit("join", { name: name });

    // On cache l'écran de saisie, on affiche le chat
    document.getElementById("joinScreen").style.display = "none";
    document.getElementById("chatScreen").style.display = "block";
    document.getElementById("myName").innerText = "Tu es connecté en tant que : " + name;

    // Ici plus tard : démarrage
