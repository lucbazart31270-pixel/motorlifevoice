<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Chat Proximité - BeamMP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }

    .container {
      background: linear-gradient(135deg, #1f1f1f 0%, #2a2a2a 100%);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 0, 0, 0.2);
      max-width: 700px;
      width: 100%;
      border: 2px solid #ff0000;
    }

    h1 {
      text-align: center;
      background: linear-gradient(135deg, #ff0000, #0066ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 30px;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #0066ff;
      font-weight: bold;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input[type="text"] {
      width: 100%;
      padding: 15px;
      border: 2px solid #0066ff;
      background: rgba(0, 102, 255, 0.1);
      border-radius: 10px;
      font-size: 16px;
      color: #fff;
      transition: all 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #ff0000;
      background: rgba(255, 0, 0, 0.1);
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
    }

    input[type="text"]::placeholder {
      color: #666;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ff0000, #cc0000);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 30px rgba(255, 0, 0, 0.6);
    }

    button:disabled {
      background: #444;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-success {
      background: linear-gradient(135deg, #00cc44, #009933);
      box-shadow: 0 0 20px rgba(0, 204, 68, 0.4);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ff0000, #cc0000);
    }

    #status {
      text-align: center;
      padding: 15px;
      margin: 20px 0;
      border-radius: 10px;
      font-weight: bold;
      display: none;
    }

    #status.connected {
      background: rgba(0, 204, 68, 0.2);
      border: 2px solid #00cc44;
      color: #00cc44;
      display: block;
    }

    #proximitySection, #callsSection, #statsSection {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      border: 1px solid #333;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #0066ff;
      text-transform: uppercase;
    }

    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      border: 1px solid #333;
      transition: all 0.3s;
    }

    .user-item.call-active {
      border-color: #00cc44;
      background: rgba(0, 204, 68, 0.1);
    }

    .user-info {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-weight: bold;
      font-size: 16px;
    }

    .user-distance {
      font-size: 12px;
      color: #ff9900;
      margin-top: 3px;
    }

    .user-actions button {
      width: auto;
      padding: 8px 20px;
      margin: 0;
      font-size: 13px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .stat-box {
      text-align: center;
      padding: 15px;
      background: rgba(0, 102, 255, 0.1);
      border-radius: 10px;
      border: 1px solid #0066ff;
    }

    .stat-number {
      font-size: 32px;
      font-weight: bold;
      color: #0066ff;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      margin-top: 5px;
    }

    .incoming-call {
      background: rgba(255, 153, 0, 0.2);
      border: 2px solid #ff9900;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
    }

    .incoming-call-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .incoming-call-buttons button {
      margin: 0;
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎙️ VOICE PROXIMITÉ</h1>

    <div class="form-group">
      <label for="username">📝 Ton Pseudo :</label>
      <input type="text" id="username" placeholder="Entre ton nom..." autocomplete="off">
    </div>

    <div class="form-group">
      <label for="linkId">🔑 ID BeamMP (affiché en jeu) :</label>
      <input type="text" id="linkId" placeholder="Ex: A3X9K2" autocomplete="off">
    </div>

    <button onclick="connectToServer()">🔴 SE CONNECTER</button>

    <div id="status"></div>

    <div id="proximitySection">
      <div class="section-title">📍 Statut Position</div>
      <p id="positionInfo">En attente de données BeamMP...</p>
    </div>

    <div id="callsSection">
      <div class="section-title">👥 Utilisateurs Connectés</div>
      <div id="incomingCallsList"></div>
      <div id="usersList"></div>
    </div>

    <div id="statsSection">
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-number" id="callCount">0</div>
          <div class="stat-label">Appels Actifs</div>
        </div>
        <div class="stat-box">
          <div class="stat-number" id="incomingCount">0</div>
          <div class="stat-label">Appels Entrants</div>
        </div>
      </div>
    </div>
  </div>

  <audio id="localAudio" autoplay muted></audio>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myUsername = "";
    let myId = null;
    let myPosition = { x: 0, y: 0, z: 0 };
    let allUsers = {};
    let usersNearby = {};
    let activeCallsWith = new Set();
    let pendingCalls = {};
    let incomingCalls = {};
    let peerConnections = {};
    let localStream = null;

    const PROXIMITY_RANGE = 50; // 50 mètres

    const rtcConfig = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
      ]
    };

    async function getMicrophone() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        document.getElementById("localAudio").srcObject = localStream;
      } catch (err) {
        alert("❌ Impossible d'accéder au microphone : " + err.message);
      }
    }

    function connectToServer() {
      const username = document.getElementById("username").value.trim();
      const linkId = document.getElementById("linkId").value.trim();
      
      if (!username || !linkId) {
        alert("❌ Entre un pseudo ET l'ID BeamMP !");
        return;
      }

      document.getElementById("username").disabled = true;
      document.getElementById("linkId").disabled = true;
      document.querySelector("button").disabled = true;
      showStatus("⏳ Connexion en cours...", "");

      getMicrophone();

      socket.emit("register", { username, linkId });
      myUsername = username;

      showStatus("✅ CONNECTÉ ! En attente de la position BeamMP...", "connected");
      document.getElementById("proximitySection").style.display = "block";
      document.getElementById("callsSection").style.display = "block";
      document.getElementById("statsSection").style.display = "block";

      updateProximityStatus();
    }

    function showStatus(message, className) {
      const status = document.getElementById("status");
      status.innerText = message;
      status.className = className;
      status.style.display = "block";
    }

    socket.on("registered", ({ userId }) => {
      myId = userId;
      socket.emit("getUsersList");
    });

    socket.on("myPositionUpdate", (pos) => {
      myPosition = { x: pos.x, y: pos.y, z: pos.z };
      document.getElementById("positionInfo").innerText = 
        `📍 Position: X=${pos.x.toFixed(1)} Y=${pos.y.toFixed(1)} Z=${pos.z.toFixed(1)}`;
    });

    socket.on("usersList", ({ users }) => {
      allUsers = {};
      users.forEach(u => {
        allUsers[u.id] = u;
      });
      renderUsersList();
    });

    socket.on("userJoined", ({ userId, username }) => {
      allUsers[userId] = { id: userId, username, position: { x: 0, y: 0, z: 0 } };
      renderUsersList();
    });

    socket.on("userLeft", ({ userId }) => {
      delete allUsers[userId];
      delete usersNearby[userId];
      activeCallsWith.delete(userId);
      closeConnection(userId);
      renderUsersList();
      updateStats();
    });

    socket.on("userPositionUpdate", ({ userId, username, x, y, z }) => {
      if (allUsers[userId]) {
        allUsers[userId].position = { x, y, z };
        allUsers[userId].username = username;
      }
      if (userId === myId) {
        myPosition = { x, y, z };
        document.getElementById("positionInfo").innerText = 
          `📍 Position: X=${x.toFixed(1)} Y=${y.toFixed(1)} Z=${z.toFixed(1)}`;
      }
      renderUsersList();
    });

    function calculateDistance(pos1, pos2) {
      const dx = pos1.x - pos2.x;
      const dy = pos1.y - pos2.y;
      const dz = pos1.z - pos2.z;
      return Math.sqrt(dx * dx + dy * dy + dz * dz);
    }

    function updateProximityStatus() {
      if (!myId) return;

      Object.values(allUsers).forEach(user => {
        if (user.id === myId) return;

        const distance = calculateDistance(myPosition, user.position);
        const isNearby = distance <= PROXIMITY_RANGE;
        const wasNearby = usersNearby[user.id];

        if (isNearby && !wasNearby) {
          usersNearby[user.id] = true;
          if (!activeCallsWith.has(user.id) && !pendingCalls[user.id]) {
            autoCallUser(user.id, user.username);
          }
        } else if (!isNearby && wasNearby) {
          delete usersNearby[user.id];
          if (activeCallsWith.has(user.id)) {
            disconnectUser(user.id);
          }
        }
      });

      renderUsersList();
    }

    function autoCallUser(userId, username) {
      pendingCalls[userId] = true;
      socket.emit("callUser", { to: userId, username: myUsername, isAuto: true });
      renderUsersList();
    }

    function callUserManual(userId, username) {
      if (activeCallsWith.has(userId)) return;
      pendingCalls[userId] = true;
      socket.emit("callUser", { to: userId, username: myUsername, isAuto: false });
      renderUsersList();
    }

    socket.on("incomingCall", ({ from, username }) => {
      incomingCalls[from] = username;
      renderIncomingCalls();
      updateStats();
    });

    function acceptCall(from) {
      delete incomingCalls[from];
      activeCallsWith.add(from);
      socket.emit("acceptCall", { to: from });
      createPeerConnection(from, true);
      renderIncomingCalls();
      renderUsersList();
      updateStats();
    }

    function rejectCall(from) {
      delete incomingCalls[from];
      socket.emit("rejectCall", { to: from });
      renderIncomingCalls();
      updateStats();
    }

    socket.on("callAccepted", ({ from }) => {
      delete pendingCalls[from];
      activeCallsWith.add(from);
      createPeerConnection(from, false);
      renderUsersList();
    });

    socket.on("callRejected", ({ from }) => {
      delete pendingCalls[from];
      renderUsersList();
    });

    function createPeerConnection(userId, isInitiator) {
      const pc = new RTCPeerConnection(rtcConfig);
      peerConnections[userId] = pc;

      if (localStream) {
        localStream.getTracks().forEach(track => {
          pc.addTrack(track, localStream);
        });
      }

      pc.ontrack = (event) => {
        let audioEl = document.getElementById(`audio-${userId}`);
        if (!audioEl) {
          audioEl = document.createElement("audio");
          audioEl.id = `audio-${userId}`;
          audioEl.autoplay = true;
          document.body.appendChild(audioEl);
        }
        audioEl.srcObject = event.streams[0];
      };

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit("signal", { to: userId, data: { candidate: event.candidate } });
        }
      };

      if (isInitiator) {
        pc.createOffer().then(offer => {
          pc.setLocalDescription(offer);
          socket.emit("signal", { to: userId, data: { sdp: offer } });
        });
      }
    }

    socket.on("signal", async ({ from, data }) => {
      let pc = peerConnections[from];
      if (!pc) {
        createPeerConnection(from, false);
        pc = peerConnections[from];
      }

      if (data.sdp) {
        await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
        if (data.sdp.type === "offer") {
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          socket.emit("signal", { to: from, data: { sdp: answer } });
        }
      } else if (data.candidate) {
        try {
          await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        } catch (err) {
          console.error("Erreur ICE candidate:", err);
        }
      }
    });

    function disconnectUser(userId) {
      activeCallsWith.delete(userId);
      closeConnection(userId);
      renderUsersList();
      updateStats();
    }

    function closeConnection(userId) {
      if (peerConnections[userId]) {
        peerConnections[userId].close();
        delete peerConnections[userId];
      }
      const audioEl = document.getElementById(`audio-${userId}`);
      if (audioEl) audioEl.remove();
    }

    function renderIncomingCalls() {
      const container = document.getElementById("incomingCallsList");
      container.innerHTML = "";

      Object.entries(incomingCalls).forEach(([from, username]) => {
        const div = document.createElement("div");
        div.className = "incoming-call";
        div.innerHTML = `
          <p>📞 <strong>${username}</strong> t'appelle...</p>
          <div class="incoming-call-buttons">
            <button class="btn-success" onclick="acceptCall('${from}')">✅ ACCEPTER</button>
            <button class="btn-danger" onclick="rejectCall('${from}')">❌ REFUSER</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function renderUsersList() {
      const list = document.getElementById("usersList");
      list.innerHTML = "";

      const otherUsers = Object.values(allUsers).filter(u => u.id !== myId);

      if (otherUsers.length === 0) {
        list.innerHTML = "<p style='color: #999; text-align: center;'>⏳ Aucun utilisateur disponible</p>";
        return;
      }

      otherUsers.forEach(user => {
        const isActive = activeCallsWith.has(user.id);
        const isPending = pendingCalls[user.id];
        const isNearby = usersNearby[user.id];

        const div = document.createElement("div");
        div.className = `user-item ${isActive ? "call-active" : ""}`;

        let button = '';
        if (isActive) {
          button = `<button class="btn-danger" onclick="disconnectUser('${user.id}')">🔴 RACCROCHER</button>`;
        } else if (isPending) {
          button = `<button disabled>⏳ EN ATTENTE...</button>`;
        } else {
          button = `<button class="btn-success" onclick="callUserManual('${user.id}', '${user.username}')">📞 APPELER</button>`;
        }

        div.innerHTML = `
          <div class="user-info">
            <span class="user-name">${isActive ? "✅ " : ""}${user.username}</span>
            <span class="user-distance">${isNearby ? "📍 À PROXIMITÉ (AUTO)" : ""}</span>
          </div>
          <div class="user-actions">
            ${button}
          </div>
        `;
        list.appendChild(div);
      });
    }

    function updateStats() {
      const callCount = activeCallsWith.size;
      const incomingCount = Object.keys(incomingCalls).length;
      document.getElementById("callCount").innerText = callCount;
      document.getElementById("incomingCount").innerText = incomingCount;
    }

    setInterval(updateProximityStatus, 1000);
  </script>
</body>
</html>
