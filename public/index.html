<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat Vocal</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1e1e2f;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  #joinScreen input {
    padding: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    margin-bottom: 10px;
  }
  #joinScreen button, #chatScreen button {
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    background: #4CAF50;
    color: white;
    cursor: pointer;
    margin-top: 10px;
  }
  #joinScreen button:hover, #chatScreen button:hover {
    background: #45a049;
  }
  #muteBtn.muted {
    background: #e74c3c;
  }
  #muteBtn.muted:hover {
    background: #c0392b;
  }
  #chatScreen {
    display: none;
    text-align: center;
  }
  #playersList {
    margin-top: 20px;
    list-style: none;
    padding: 0;
    min-width: 250px;
  }
  #playersList li {
    background: #2c2c3e;
    margin: 5px 0;
    padding: 8px 15px;
    border-radius: 5px;
  }
  #status {
    margin-top: 10px;
    font-size: 14px;
    color: #aaa;
  }
</style>
</head>
<body>

<div id="joinScreen">
  <h1>🎤 Chat Vocal</h1>
  <input type="text" id="nameInput" placeholder="Entre ton nom" maxlength="20"><br>
  <button id="joinBtn">Rejoindre</button>
</div>

<div id="chatScreen">
  <h1>✅ Connecté au chat vocal</h1>
  <p id="myName"></p>
  <button id="muteBtn">🔊 Micro actif (clique pour couper)</button>
  <p id="status">Micro en attente...</p>
  <h3>Joueurs connectés :</h3>
  <ul id="playersList"></ul>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = "";
  let localStream = null;
  let isMuted = false;
  const peers = {}; // stocke les connexions WebRTC avec les autres joueurs

  function joinChat() {
    const input = document.getElementById("nameInput");
    const name = input.value.trim();

    if (name === "") {
      alert("Merci d'entrer un nom !");
      return;
    }

    myName = name;
    socket.emit("join", { name: name });

    document.getElementById("joinScreen").style.display = "none";
    document.getElementById("chatScreen").style.display = "block";
    document.getElementById("myName").innerText = "Tu es connecté en tant que : " + name;

    startVoiceChat();
  }

  document.getElementById("joinBtn").addEventListener("click", joinChat);
  document.getElementById("nameInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") joinChat();
  });

  socket.on("playersUpdate", (players) => {
    const list = document.getElementById("playersList");
    list.innerHTML = "";
    players.forEach((p) => {
      const li = document.createElement("li");
      li.innerText = "🎮 " + p.name + (p.id === socket.id ? " (toi)" : "");
      list.appendChild(li);
    });
  });
